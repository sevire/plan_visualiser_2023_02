services:
  django_gunicorn:
    image: ${REGISTRY_PREFIX}{GUNICORN_IMAGE}
    volumes:
      - static:/static
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: ${REGISTRY_PREFIX}${NGINX_IMAGE}
    ports:
      - "80:80"
    volumes:
      - static:/static
    depends_on:
      - django_gunicorn

  db:
    image: postgres:16.13
    volumes:
      - data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  static:
  data: